<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photoharu Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f8fa; }
    .sidebar { min-height: 100vh; background: #111827; color: #e5e7eb; }
    .sidebar a { color: #e5e7eb; text-decoration: none; display: block; padding: 10px 14px; border-radius: 8px; }
    .sidebar a:hover { background: #1f2937; }
    .content-wrap { padding: 20px; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar py-3">
        <div class="px-3 mb-3 fw-bold">Photoharu Dashboard</div>
        <a href="/dashboard/">매출 현황</a>
        <a href="/dashboard/devices">장치 관리</a>
        <a href="/dashboard/sales">매출 관리</a>
        <a href="/dashboard/coupons">쿠폰 관리</a>
        <a href="/dashboard/photos">사진 관리</a>
        <hr class="border-secondary">
        <a href="/dashboard/logout">로그아웃</a>
      </nav>
      <main class="col-md-10 ms-sm-auto content-wrap">
        <div class="d-md-none mb-2">
          <button class="btn btn-dark" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">Menu</button>
          <div class="collapse mt-2" id="mobileMenu">
            <div class="card card-body">
              <a href="/dashboard/">매출 현황</a>
              <a href="/dashboard/devices">장치 관리</a>
              <a href="/dashboard/sales">매출 관리</a>
              <a href="/dashboard/coupons">쿠폰 관리</a>
              <a href="/dashboard/photos">사진 관리</a>
              <a href="/dashboard/logout">로그아웃</a>
            </div>
          </div>
        </div>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
          {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
