<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viorafilm Dashboard Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f766e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card-login {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      border: 0;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
    }
  </style>
</head>
<body>
  <div class="card card-login">
    <div class="card-body p-4">
      <h4 class="mb-1">Viorafilm</h4>
      <div class="text-secondary small mb-3">관리자 로그인</div>

      {% if form.errors %}
      <div class="alert alert-danger py-2">아이디 또는 비밀번호가 올바르지 않습니다.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label" for="id_username">아이디</label>
          <input class="form-control" id="id_username" name="username" type="text" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label" for="id_password">비밀번호</label>
          <input class="form-control" id="id_password" name="password" type="password" required>
        </div>

        <button class="btn btn-dark w-100" type="submit">로그인</button>
      </form>
    </div>
  </div>
</body>
</html>
