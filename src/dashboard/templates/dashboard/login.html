<!doctype html>
<html lang="{{ dashboard_ui.lang|default:'ko' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viorafilm Dashboard Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f766e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card-login {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      border: 0;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
    }
  </style>
</head>
<body>
  <div class="card card-login">
    <div class="card-body p-4">
      <div class="d-flex justify-content-end gap-2 mb-3">
        <a class="btn btn-sm {% if dashboard_ui.lang == 'ko' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="{{ dashboard_ui.switch_urls.ko }}">{{ dashboard_ui.text.base.lang_ko }}</a>
        <a class="btn btn-sm {% if dashboard_ui.lang == 'en' %}btn-dark{% else %}btn-outline-dark{% endif %}" href="{{ dashboard_ui.switch_urls.en }}">{{ dashboard_ui.text.base.lang_en }}</a>
      </div>
      <h4 class="mb-1">Viorafilm</h4>
      <div class="text-secondary small mb-3">{{ dashboard_ui.text.login.subtitle }}</div>

      {% if form.errors %}
      <div class="alert alert-danger py-2">{{ dashboard_ui.text.login.invalid_credentials }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label" for="id_username">{{ dashboard_ui.text.login.username }}</label>
          <input class="form-control" id="id_username" name="username" type="text" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label" for="id_password">{{ dashboard_ui.text.login.password }}</label>
          <input class="form-control" id="id_password" name="password" type="password" required>
        </div>

        <button class="btn btn-dark w-100" type="submit">{{ dashboard_ui.text.login.submit }}</button>
      </form>
    </div>
  </div>
</body>
</html>
