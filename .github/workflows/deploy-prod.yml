name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy credentials
        run: |
          if [ -z "${{ secrets.PROD_SSH_KEY }}" ] && [ -z "${{ secrets.PROD_PASSWORD }}" ]; then
            echo "::error::Missing PROD_SSH_KEY or PROD_PASSWORD secret"
            exit 1
          fi
          if [ -z "${{ secrets.KIOSK_GEMINI_API_KEY }}" ]; then
            echo "::error::Missing KIOSK_GEMINI_API_KEY secret"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
          KIOSK_GEMINI_API_KEY: ${{ secrets.KIOSK_GEMINI_API_KEY }}
          PROD_ENV_B64: ${{ secrets.PROD_ENV_B64 }}
          PROD_SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
          PROD_ALLOWED_HOSTS: ${{ secrets.PROD_ALLOWED_HOSTS }}
          PROD_CSRF_TRUSTED_ORIGINS: ${{ secrets.PROD_CSRF_TRUSTED_ORIGINS }}
          PROD_PUBLIC_BASE_URL: ${{ secrets.PROD_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          password: ${{ secrets.PROD_PASSWORD }}
          port: ${{ secrets.PROD_PORT || '22' }}
          envs: R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PREFIX,KIOSK_GEMINI_API_KEY,PROD_ENV_B64,PROD_SECRET_KEY,PROD_ALLOWED_HOSTS,PROD_CSRF_TRUSTED_ORIGINS,PROD_PUBLIC_BASE_URL
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/viorafilm-server"
            fi
            cd "${APP_DIR}"

            ensure_env_file() {
              if [ -f ".env" ]; then
                return 0
              fi

              if [ -n "${PROD_ENV_B64:-}" ]; then
                tmp_raw="$(mktemp)"
                tmp_clean="$(mktemp)"
                if ! printf '%s' "${PROD_ENV_B64}" | base64 --decode > "${tmp_raw}"; then
                  rm -f "${tmp_raw}" "${tmp_clean}"
                  echo "::error::PROD_ENV_B64 is not valid base64"
                  exit 1
                fi
                tr -d '\r' < "${tmp_raw}" > "${tmp_clean}"
                mv "${tmp_clean}" .env
                rm -f "${tmp_raw}"
                chmod 600 .env
                echo "[DEPLOY] bootstrapped .env from PROD_ENV_B64"
                return 0
              fi

              if [ -n "${PROD_SECRET_KEY:-}" ] && [ -n "${PROD_ALLOWED_HOSTS:-}" ]; then
                tmp_env="$(mktemp)"
                {
                  printf 'DEBUG=0\n'
                  printf 'SECRET_KEY=%s\n' "${PROD_SECRET_KEY}"
                  printf 'ALLOWED_HOSTS=%s\n' "${PROD_ALLOWED_HOSTS}"
                  if [ -n "${PROD_CSRF_TRUSTED_ORIGINS:-}" ]; then
                    printf 'CSRF_TRUSTED_ORIGINS=%s\n' "${PROD_CSRF_TRUSTED_ORIGINS}"
                  fi
                  if [ -n "${PROD_PUBLIC_BASE_URL:-}" ]; then
                    printf 'PUBLIC_BASE_URL=%s\n' "${PROD_PUBLIC_BASE_URL}"
                  fi
                } > "${tmp_env}"
                mv "${tmp_env}" .env
                chmod 600 .env
                echo "[DEPLOY] bootstrapped .env from minimal PROD_* secrets"
                return 0
              fi

              echo "::error::.env is missing on host and no bootstrap secrets were provided. Set PROD_ENV_B64 or PROD_SECRET_KEY plus PROD_ALLOWED_HOSTS."
              exit 1
            }

            update_env() {
              key="$1"
              value="${2:-}"
              if [ -z "$value" ]; then
                return 0
              fi
              tmp="$(mktemp)"
              if [ -f ".env" ]; then
                grep -v "^${key}=" .env > "$tmp" || true
              fi
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              mv "$tmp" .env
            }

            require_env_value() {
              key="$1"
              value="$(grep "^${key}=" .env | head -n 1 | cut -d= -f2- || true)"
              if [ -z "${value}" ]; then
                echo "::error::.env is missing required key ${key}"
                exit 1
              fi
            }

            current_env_value() {
              key="$1"
              grep "^${key}=" .env | head -n 1 | cut -d= -f2- || true
            }

            run_checked() {
              label="$1"
              shift
              if ! "$@"; then
                echo "::error::${label} failed"
                exit 1
              fi
            }

            ensure_env_file
            update_env "R2_ACCOUNT_ID" "${R2_ACCOUNT_ID:-}"
            update_env "R2_ACCESS_KEY_ID" "${R2_ACCESS_KEY_ID:-}"
            update_env "R2_SECRET_ACCESS_KEY" "${R2_SECRET_ACCESS_KEY:-}"
            update_env "R2_BUCKET_NAME" "${R2_BUCKET_NAME:-}"
            update_env "R2_PREFIX" "${R2_PREFIX:-}"
            update_env "ALLOWED_HOSTS" "${PROD_ALLOWED_HOSTS:-}"
            update_env "CSRF_TRUSTED_ORIGINS" "${PROD_CSRF_TRUSTED_ORIGINS:-}"
            update_env "PUBLIC_BASE_URL" "${PROD_PUBLIC_BASE_URL:-}"
            update_env "DEBUG" "0"
            update_env "CORS_ALLOW_ALL" "0"
            update_env "SESSION_COOKIE_SECURE" "1"
            update_env "CSRF_COOKIE_SECURE" "1"
            update_env "SECURE_SSL_REDIRECT" "1"
            update_env "SECURE_HSTS_SECONDS" "31536000"
            update_env "SECURE_HSTS_INCLUDE_SUBDOMAINS" "1"
            update_env "SECURE_HSTS_PRELOAD" "1"
            KIOSK_GEMINI_API_KEY_VALUE="${KIOSK_GEMINI_API_KEY:-${{ secrets.KIOSK_GEMINI_API_KEY }}}"
            if [ -z "${KIOSK_GEMINI_API_KEY_VALUE}" ]; then
              echo "::error::KIOSK_GEMINI_API_KEY not available in deploy runtime"
              exit 1
            fi
            update_env "KIOSK_GEMINI_API_KEY" "${KIOSK_GEMINI_API_KEY_VALUE}"
            export KIOSK_GEMINI_API_KEY="${KIOSK_GEMINI_API_KEY_VALUE}"

            SECRET_KEY_VALUE="$(current_env_value "SECRET_KEY")"
            if [ -z "${SECRET_KEY_VALUE}" ] && [ -n "${PROD_SECRET_KEY:-}" ]; then
              update_env "SECRET_KEY" "${PROD_SECRET_KEY}"
              SECRET_KEY_VALUE="${PROD_SECRET_KEY}"
              echo "[DEPLOY] provisioned missing SECRET_KEY from PROD_SECRET_KEY"
            fi
            if [ "${SECRET_KEY_VALUE}" = "dev-secret-change-me" ]; then
              if [ -n "${PROD_SECRET_KEY:-}" ]; then
                update_env "SECRET_KEY" "${PROD_SECRET_KEY}"
                SECRET_KEY_VALUE="${PROD_SECRET_KEY}"
                echo "[DEPLOY] replaced development SECRET_KEY from PROD_SECRET_KEY"
              else
                echo "::error::Refusing deploy with development SECRET_KEY. Set PROD_SECRET_KEY or update host .env."
                exit 1
              fi
            fi

            require_env_value "SECRET_KEY"
            require_env_value "ALLOWED_HOSTS"
            HOST_KEY_LINE="$(grep '^KIOSK_GEMINI_API_KEY=' .env | head -n 1 || true)"
            HOST_KEY_VALUE="${HOST_KEY_LINE#KIOSK_GEMINI_API_KEY=}"
            echo "[DEPLOY] host .env KIOSK_GEMINI_API_KEY configured=$([ -n "${HOST_KEY_VALUE}" ] && echo 1 || echo 0) len=${#HOST_KEY_VALUE}"

            run_checked "git fetch origin main" git fetch origin main
            run_checked "git checkout main" git checkout main
            run_checked "git pull --ff-only origin main" git pull --ff-only origin main

            run_checked "docker compose up" docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            run_checked "manage.py migrate" docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py migrate
            run_checked "collectstatic" docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            run_checked "container KIOSK_GEMINI_API_KEY check" docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python -c "import os,sys; key=str(os.environ.get('KIOSK_GEMINI_API_KEY','') or '').strip(); print(f'[DEPLOY] container env KIOSK_GEMINI_API_KEY configured={1 if key else 0} len={len(key)}'); key or sys.exit('KIOSK_GEMINI_API_KEY missing in container env')"
            run_checked "runtime settings KIOSK_GEMINI_API_KEY check" docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python -c "import os,sys; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings'); import django; django.setup(); from django.conf import settings; key=str(getattr(settings,'KIOSK_GEMINI_API_KEY','') or '').strip(); print(f'[DEPLOY] settings KIOSK_GEMINI_API_KEY configured={1 if key else 0} len={len(key)}'); key or sys.exit('KIOSK_GEMINI_API_KEY missing in runtime settings')"
