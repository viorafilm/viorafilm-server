name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy credentials
        run: |
          if [ -z "${{ secrets.PROD_SSH_KEY }}" ] && [ -z "${{ secrets.PROD_PASSWORD }}" ]; then
            echo "::error::Missing PROD_SSH_KEY or PROD_PASSWORD secret"
            exit 1
          fi
          if [ -z "${{ secrets.KIOSK_GEMINI_API_KEY }}" ]; then
            echo "::error::Missing KIOSK_GEMINI_API_KEY secret"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
          KIOSK_GEMINI_API_KEY: ${{ secrets.KIOSK_GEMINI_API_KEY }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          password: ${{ secrets.PROD_PASSWORD }}
          port: ${{ secrets.PROD_PORT || '22' }}
          envs: R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PREFIX,KIOSK_GEMINI_API_KEY
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/viorafilm-server"
            fi
            cd "${APP_DIR}"

            if [ ! -f ".env" ] && [ -f ".env.example" ]; then
              cp .env.example .env
            fi

            update_env() {
              key="$1"
              value="${2:-}"
              if [ -z "$value" ]; then
                return 0
              fi
              tmp="$(mktemp)"
              if [ -f ".env" ]; then
                grep -v "^${key}=" .env > "$tmp" || true
              fi
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              mv "$tmp" .env
            }

            update_env "R2_ACCOUNT_ID" "${R2_ACCOUNT_ID:-}"
            update_env "R2_ACCESS_KEY_ID" "${R2_ACCESS_KEY_ID:-}"
            update_env "R2_SECRET_ACCESS_KEY" "${R2_SECRET_ACCESS_KEY:-}"
            update_env "R2_BUCKET_NAME" "${R2_BUCKET_NAME:-}"
            update_env "R2_PREFIX" "${R2_PREFIX:-}"
            update_env "KIOSK_GEMINI_API_KEY" "${KIOSK_GEMINI_API_KEY:-}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python -c "import os,sys; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings'); import django; django.setup(); from django.conf import settings; key=str(getattr(settings,'KIOSK_GEMINI_API_KEY','') or '').strip(); print(f'[DEPLOY] KIOSK_GEMINI_API_KEY configured={1 if key else 0} len={len(key)}'); key or sys.exit('KIOSK_GEMINI_API_KEY missing in runtime settings')"
