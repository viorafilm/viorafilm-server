name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/viorafilm-server"
            fi
            cd "${APP_DIR}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
