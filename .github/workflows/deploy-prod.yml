name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy credentials
        run: |
          if [ -z "${{ secrets.PROD_SSH_KEY }}" ] && [ -z "${{ secrets.PROD_PASSWORD }}" ]; then
            echo "::error::Missing PROD_SSH_KEY or PROD_PASSWORD secret"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          password: ${{ secrets.PROD_PASSWORD }}
          port: ${{ secrets.PROD_PORT || '22' }}
          envs: R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PREFIX
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/viorafilm-server"
            fi
            cd "${APP_DIR}"

            if [ ! -f ".env" ] && [ -f ".env.example" ]; then
              cp .env.example .env
            fi

            python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path(".env")
            env_path.touch(exist_ok=True)
            original_lines = env_path.read_text(encoding="utf-8").splitlines()
            updates = {
                "R2_ACCOUNT_ID": os.environ.get("R2_ACCOUNT_ID", ""),
                "R2_ACCESS_KEY_ID": os.environ.get("R2_ACCESS_KEY_ID", ""),
                "R2_SECRET_ACCESS_KEY": os.environ.get("R2_SECRET_ACCESS_KEY", ""),
                "R2_BUCKET_NAME": os.environ.get("R2_BUCKET_NAME", ""),
                "R2_PREFIX": os.environ.get("R2_PREFIX", ""),
            }

            lines = []
            seen = set()
            for line in original_lines:
                stripped = line.strip()
                if not stripped or stripped.startswith("#") or "=" not in line:
                    lines.append(line)
                    continue

                key, _ = line.split("=", 1)
                value = updates.get(key, "")
                if value:
                    lines.append(f"{key}={value}")
                    seen.add(key)
                else:
                    lines.append(line)

            for key, value in updates.items():
                if value and key not in seen:
                    lines.append(f"{key}={value}")

            env_path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
            PY

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
